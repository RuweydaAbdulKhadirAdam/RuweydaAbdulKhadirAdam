<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#130a28"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00f5d4" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ff2d78" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="210" fill="url(#bg)" rx="0"/>

  <!-- Animated top wave -->
  <path fill="#00f5d4" fill-opacity="0.04">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M0,0 Q450,30 900,0 L900,8 Q450,38 0,8 Z;
              M0,0 Q450,10 900,0 L900,8 Q450,18 0,8 Z;
              M0,0 Q450,30 900,0 L900,8 Q450,38 0,8 Z"/>
  </path>

  <!-- Animated bottom wave -->
  <path fill="#ff2d78" fill-opacity="0.05">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="M0,202 Q450,180 900,202 L900,210 L0,210 Z;
              M0,202 Q450,218 900,202 L900,210 L0,210 Z;
              M0,202 Q450,180 900,202 L900,210 L0,210 Z"/>
  </path>

  <!-- Stars -->
  <circle cx="60"  cy="22" r="1.2" fill="#00f5d4"><animate attributeName="opacity" values="1;0.1;1" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="18" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="55" r="1"   fill="#ff2d78"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="80" r="1.2" fill="#00f5d4"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="120" r="1" fill="#a855f7"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="25"  cy="140" r="1.5" fill="#ff2d78"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="170" r="1"   fill="#00f5d4"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="170" r="1.2" fill="#a855f7"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.3s" repeatCount="indefinite"/></circle>

  <!-- Name - animated fade-in + slide up -->
  <text x="450" y="85" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46" font-weight="bold"
    fill="url(#nameGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1" dur="1.2s" begin="0.2s" fill="freeze"/>
    <animate attributeName="y" values="100;85" dur="1.2s" begin="0.2s" fill="freeze"/>
    Ruweyda Abdul Khadir
  </text>

  <!-- Subtitle -->
  <text x="450" y="118" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="13"
    fill="#e2e8f0" letter-spacing="3" opacity="0">
    SOFTWARE ENGINEER — FULL-STACK &amp; MOBILE DEVELOPER
    <animate attributeName="opacity" values="0;0.9" dur="1s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Divider line -->
  <line x1="180" y1="132" x2="720" y2="132"
    stroke="url(#lineGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.3s" fill="freeze"/>
  </line>

  <!-- Quote -->
  <text x="450" y="158" text-anchor="middle"
    font-family="Georgia, serif" font-size="14"
    fill="#00f5d4" font-style="italic" opacity="0">
    ✨  "Building products that make lives easier."
    <animate attributeName="opacity" values="0;0.9" dur="1s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- Animated dots -->
  <circle cx="436" cy="182" r="2.5" fill="#00f5d4" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.4s" begin="2s" fill="freeze"/>
    <animate attributeName="r" values="0;2.5" dur="0.4s" begin="2s" fill="freeze"/>
  </circle>
  <circle cx="450" cy="182" r="2.5" fill="#a855f7" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.4s" begin="2.2s" fill="freeze"/>
    <animate attributeName="r" values="0;2.5" dur="0.4s" begin="2.2s" fill="freeze"/>
  </circle>
  <circle cx="464" cy="182" r="2.5" fill="#ff2d78" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.4s" begin="2.4s" fill="freeze"/>
    <animate attributeName="r" values="0;2.5" dur="0.4s" begin="2.4s" fill="freeze"/>
  </circle>
</svg>
